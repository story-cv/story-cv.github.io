<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StoryCV{% endblock %}</title>
    <meta name="robots" content="index, follow">

    {% block meta_tags %}{% endblock %}

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate icon" href="/favicon.ico">

    {% block canonical %}{% endblock %}

    {% block structured_data %}{% endblock %}

    <!-- Global Schemas -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "StoryCV",
        "url": "https://story.cv",
        "description": "AI-powered professional resume writing through natural conversation",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://story.cv/blog?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "StoryCV",
        "url": "https://story.cv",
        "logo": {
            "@type": "ImageObject",
            "url": "https://story.cv/logo-with-text-dark.svg"
        },
        "sameAs": [
            "https://www.producthunt.com/products/storycv",
            "https://www.reddit.com/r/StoryCV/",
            "https://www.linkedin.com/company/story-cv/",
            "https://x.com/story_cv_"
        ],
        "contactPoint": {
            "@type": "ContactPoint",
            "email": "write@story.cv",
            "contactType": "customer service"
        }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/style.css">

    {% block extra_head %}{% endblock %}

    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-N4H9TWGN');</script>
    <!-- End Google Tag Manager -->
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N4H9TWGN"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <!-- Header -->
    <header class="header" id="header-container"></header>

    <!-- Main Content -->
    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer Section -->
    <div id="footer-container"></div>

    <script src="/header.js"></script>
    <script src="/footer.js"></script>
    <script src="/script.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
