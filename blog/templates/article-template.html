
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="{{DESCRIPTION}}">
    <meta name="keywords" content="{{KEYWORDS}}">
    <meta name="author" content="StoryCV">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://story.cv/blog/articles/{{SLUG}}/">
    <meta property="og:site_name" content="StoryCV">
    <meta property="article:published_time" content="{{PUBLISH_DATE}}">
    <meta property="article:author" content="StoryCV Team">
    <meta property="article:section" content="{{CATEGORY}}">
    
    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{TITLE}}">
    <meta name="twitter:description" content="{{DESCRIPTION}}">
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        "headline": "{{TITLE}}",
        "description": "{{DESCRIPTION}}",
        "author": {
            "@type": "Organization",
            "name": "StoryCV"
        },
        "publisher": {
            "@type": "Organization",
            "name": "StoryCV",
            "url": "https://story.cv"
        },
        "datePublished": "{{PUBLISH_DATE_SHORT}}",
        "dateModified": "{{PUBLISH_DATE_SHORT}}",
        "mainEntityOfPage": {
            "@type": "WebPage",
            "@id": "https://story.cv/blog/articles/{{SLUG}}/"
        }
    }
    </script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../../../style.css">
    
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-N4H9TWGN');</script>
    <!-- End Google Tag Manager -->
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N4H9TWGN"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <!-- Header -->
    <header class="header" id="header-container"></header>

    <!-- Main Content -->
    <main class="main">
        <!-- Blog Post Header -->
        <section class="blog-post-header">
            <div class="container">
                <div class="blog-post-meta">
                    <a href="/blog" class="back-to-blog">← Back to Blog</a>
                </div>
                <h1 class="blog-post-title">{{TITLE}}</h1>
                <div class="blog-post-info">
                    <span class="post-date">{{DISPLAY_DATE}}</span>
                    <span class="post-read-time">{{READ_TIME}} min read</span>
                    <span class="post-author">By StoryCV Team</span>
                </div>
            </div>
        </section>

        <!-- Featured Image -->
        <section class="blog-post-image">
            <div class="container">
                <img src="../../images/{{FEATURED_IMAGE}}" alt="{{IMAGE_ALT}}" class="post-featured-image">
            </div>
        </section>

        <!-- Blog Post Content -->
        <article class="blog-post-content">
            <div class="container">
                <div class="blog-post-body">
                    {{CONTENT}}
                </div>

                <!-- Related Posts -->
                <section class="related-posts">
                    <h3>Related Articles</h3>
                    <div class="related-posts-grid">
                        {{RELATED_POSTS}}
                    </div>
                </section>
            </div>
        </article>
    </main>

    <!-- Footer Section -->
    <div id="footer-container"></div>

    <script src="../../../header.js"></script>
    <script src="../../../footer.js"></script>
    <script src="../../../script.js"></script>
    <script src="../../related-articles.js"></script>
</body>
</html>
